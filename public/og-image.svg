  </text>
  <text x="80" y="460" fill="url(#accent)" font-family="-apple-system, system-ui, sans-serif" font-size="60" font-weight="600" letter-spacing="-1.5">
    가치를 구현합니다
  </text>

  <text x="80" y="560" fill="#A1A1AA" font-family="-apple-system, system-ui, sans-serif" font-size="24" letter-spacing="0.5">
