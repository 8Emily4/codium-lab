<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1" />
      <stop offset="0.55" stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#D946EF" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- Subtle inner light -->
  <ellipse cx="170" cy="120" rx="220" ry="160" fill="url(#glow)" opacity="0.55" />

  <!-- Soft grid hint -->
  <g opacity="0.10" stroke="#ffffff" stroke-width="2">
    <line x1="0" y1="170" x2="512" y2="170" />
    <line x1="0" y1="342" x2="512" y2="342" />
    <line x1="170" y1="0" x2="170" y2="512" />
    <line x1="342" y1="0" x2="342" y2="512" />
  </g>

  <!-- C + L monogram in a compact mark -->
  <g transform="translate(102 122)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="36">
    <!-- C -->
    <path d="M152 36
             a96 96 0 1 0 0 192" />
    <!-- L -->
    <path d="M196 36 v192 h112" />
  </g>

  <!-- Tiny accent dot to echo brand gradient -->
  <circle cx="396" cy="396" r="22" fill="#ffffff" opacity="0.95" filter="url(#soft)" />
  <circle cx="396" cy="396" r="14" fill="#ffffff" />
</svg>
