<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090B" />
      <stop offset="1" stop-color="#18181B" />
    </linearGradient>
    <!-- Brand Primary Gradient -->
    <linearGradient id="brand" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0" stop-color="#6366F1" />
      <stop offset="0.5" stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#D946EF" />
    </linearGradient>
    <!-- Outer Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />

  <!-- Premium Subtle Hex Grid -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="2" fill="none">
    <polygon points="256,40 442,148 442,364 256,472 70,364 70,148" />
    <polygon points="256,90 398,172 398,340 256,422 114,340 114,172" />
    <line x1="256" y1="40" x2="256" y2="472" />
    <line x1="70" y1="148" x2="442" y2="364" />
    <line x1="70" y1="364" x2="442" y2="148" />
  </g>

  <!-- Central Brand Symbol (Interlocking C & L) -->
  <g filter="url(#glow)">
    <!-- Path 1 (The C-loop, left side) -->
    <path d="M230,180 A 76,76 0 1, 0 230,332" fill="none" stroke="url(#brand)" stroke-width="38" stroke-linecap="round" />
    
    <!-- Path 2 (The L-loop, right side) -->
    <path d="M282,180 V332 H350" fill="none" stroke="#FFFFFF" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Sleek Accent Dot (glowing brand nucleus) -->
    <circle cx="282" cy="256" r="18" fill="url(#brand)" />
    <circle cx="282" cy="256" r="12" fill="#FFFFFF" />
  </g>
</svg>
